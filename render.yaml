services:
  # --- Backend: Web Service ---
  - type: web
    name: shiyotte-backend
    runtime: python
    rootDir: F_App/backend
    buildCommand: pip install -r requirements.txt
    startCommand: sh start.sh
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://shiyotte-frontend.onrender.com
      - key: ANTHROPIC_API_KEY
        sync: false

  # --- Frontend: Static Site ---
  - type: static
    name: shiyotte-frontend
    rootDir: F_App/frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://shiyotte-backend.onrender.com
